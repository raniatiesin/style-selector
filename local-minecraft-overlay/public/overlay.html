<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minecraft Overlay</title>
    <link rel="stylesheet" href="/overlay.css" />
  </head>
  <body>
    <main class="overlay">
      <header class="header">
        <div class="title">Minecraft Live Stats</div>
        <div class="subtitle">Local overlay</div>
      </header>

      <section class="grid">
        <div class="card">
          <div class="label">Runs</div>
          <div class="value" id="totalRuns">0</div>
        </div>
        <div class="card">
          <div class="label">Completed</div>
          <div class="value" id="completedRuns">0</div>
        </div>
        <div class="card">
          <div class="label">Avg IGT</div>
          <div class="value" id="avgIgt">--:--</div>
        </div>
        <div class="card">
          <div class="label">PB IGT</div>
          <div class="value" id="bestIgt">--:--</div>
        </div>
        <div class="card">
          <div class="label">Avg Nether</div>
          <div class="value" id="avgNether">--:--</div>
        </div>
        <div class="card">
          <div class="label">Avg End</div>
          <div class="value" id="avgEnd">--:--</div>
        </div>
      </section>
    </main>
    <script src="/overlay.js"></script>
  </body>
</html>
