<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <title>Style Selector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
    <style>
      html, body { background: #0a0a0a; margin: 0; padding: 0; overflow: hidden; }
      #app-loading {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #app-loading-line {
        width: 40px;
        height: 1px;
        background: rgba(255, 255, 255, 0.45);
        transform-origin: center;
        animation: app-pulse 1.1s ease-in-out infinite alternate;
      }
      @keyframes app-pulse {
        from { transform: scaleX(1);   opacity: 0.45; }
        to   { transform: scaleX(0.4); opacity: 0.15; }
      }
    </style>
  </head>
  <body>
    <div id="app-loading"><div id="app-loading-line"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
