<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440, initial-scale=1.0" />
    <title>tiesin stream overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0a;

        --white-100: rgba(255, 255, 255, 1.00);
        --white-92: rgba(255, 255, 255, 0.92);
        --white-82: rgba(255, 255, 255, 0.82);
        --white-70: rgba(255, 255, 255, 0.70);
        --white-55: rgba(255, 255, 255, 0.55);
        --white-45: rgba(255, 255, 255, 0.45);
        --white-40: rgba(255, 255, 255, 0.40);
        --white-35: rgba(255, 255, 255, 0.35);
        --white-25: rgba(255, 255, 255, 0.25);
        --white-12: rgba(255, 255, 255, 0.12);
        --white-10: rgba(255, 255, 255, 0.10);
        --white-07: rgba(255, 255, 255, 0.07);
        --white-06: rgba(255, 255, 255, 0.06);

        --panel-bg: rgba(10, 10, 10, 0.62);
        --font: "Space Grotesk", system-ui, -apple-system, sans-serif;

        --space-4: 4px;
        --space-8: 8px;
        --space-12: 12px;
        --space-16: 16px;
        --space-20: 20px;
        --space-24: 24px;
        --space-28: 28px;
        --space-36: 36px;
        --space-40: 40px;
        --space-48: 48px;

        --context-gap: 10px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html,
      body {
        width: 1440px;
        height: 1080px;
        overflow: hidden;
        background: transparent;
        font-family: var(--font);
        color: var(--white-92);
      }

      body {
        position: relative;
        user-select: none;
      }

      button,
      input,
      select {
        font-family: var(--font);
      }

      button {
        cursor: pointer;
        border: 1px solid var(--white-25);
        background: transparent;
        color: var(--white-92);
      }

      input,
      select {
        border: 1px solid var(--white-25);
        background: rgba(10, 10, 10, 0.82);
        color: var(--white-92);
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 1px solid rgba(255, 255, 255, 0.5);
        outline-offset: 2px;
      }

      .overlay-root {
        position: relative;
        width: 1440px;
        height: 1080px;
      }

      .zone-top {
        position: absolute;
        left: 0;
        top: 0;
        width: 1440px;
        height: 810px;
      }

      .timeline {
        position: absolute;
        left: 1095.33px;
        top: 10px;
        width: 334.67px;
        height: 799px;
        background: transparent;
        border: none;
        padding: 10px;
        display: block;
      }

      body.mode-work .timeline {
        display: block;
      }

      .timeline-list {
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .tl-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 100%;
      }

      .tl-meta {
        display: flex;
        justify-content: flex-start;
        font-family: var(--font);
        font-size: 12px;
        color: var(--white-55);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .tl-meta.current {
        color: var(--white-92);
      }

      .tl-pill {
        display: flex;
        flex-direction: column;
        gap: 4px;
        color: var(--white-55);
        background: rgba(10, 10, 10, 0.75);
        border: 1px solid var(--white-12);
        padding: 10px 10px;
        border-radius: 0;
        width: 100%;
        overflow: hidden;
      }

      .tl-title {
        display: block;
        font-family: var(--font);
        font-size: 36px;
        font-weight: 300;
        line-height: 1.04;
        letter-spacing: -0.006em;
        color: inherit;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tl-pill.current {
        color: var(--white-92);
        border-color: var(--white-45);
      }

      .context-shell {
        position: absolute;
        left: 0;
        top: 809px;
        width: 1440px;
        height: 240px;
        display: none;
        padding: 0;
      }

      body.mode-work .context-shell,
      body.mode-talk .context-shell {
        display: block;
      }

      .context-panel {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 293.33px 334.67px;
        gap: var(--context-gap);
        padding: var(--context-gap);
      }

      .hero-col {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: var(--context-gap);
        min-width: 0;
        padding-right: 0;
      }

      .today-time {
        font-size: 92.5px;
        line-height: 0.92;
        font-weight: 400;
        color: var(--white-92);
        letter-spacing: -0.012em;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .session-line {
        font-size: 36px;
        line-height: 1.04;
        font-weight: 300;
        color: var(--white-70);
        display: flex;
        align-items: center;
        gap: var(--context-gap);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .session-label {
        color: var(--white-55);
      }

      .side-col {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: var(--context-gap);
        text-align: left;
        min-width: 0;
      }

      .hero-pill {
        align-self: stretch;
        max-width: 100%;
      }

      .hero-timer-pill {
        margin: 0;
      }

      .hero-pill .side-line {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .context-pill {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        font-family: var(--font);
        font-size: 0.75rem;
        font-weight: 400;
        line-height: 1.2;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 9px 22px;
        border-radius: 0;
        transition: color 0.18s ease, border-color 0.18s ease;
        width: 100%;
        overflow: hidden;
      }

      .context-pill.stack {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: var(--context-gap);
      }

      .side-line {
        display: block;
        font-size: 36px;
        line-height: 1.04;
        color: inherit;
        white-space: nowrap;
        letter-spacing: -0.006em;
        font-variant-numeric: tabular-nums;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .progress-strip {
        position: absolute;
        left: 10px;
        top: 1049px;
        width: 1075.33px;
        height: 21px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0;
        overflow: hidden;
        display: block;
      }

      body.mode-break .progress-strip {
        display: none;
      }

      .progress-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        background: #f5f5f5;
        transition: width 1s linear;
      }

      .break-screen {
        position: absolute;
        left: 0;
        top: 0;
        width: 1440px;
        height: 1080px;
        display: none;
        overflow: hidden;
        background: #0a0a0a;
      }

      body.mode-break .break-screen {
        display: block;
      }

      .break-fill {
        position: absolute;
        left: 0;
        top: 0;
        width: 0;
        height: 100%;
        background: #f5f5f5;
        transition: width 1s linear;
      }

      .break-content {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        padding: 100px 120px 80px;
        display: grid;
        grid-template-rows: auto auto auto auto auto 1fr auto;
        gap: 18px;
      }

      .inverted {
        color: var(--white-100);
        mix-blend-mode: difference;
      }

      .break-clock {
        text-align: center;
        font-size: 120px;
        line-height: 0.9;
        font-weight: 400;
      }

      .break-date {
        text-align: center;
        font-size: 30px;
      }

      .break-duration {
        text-align: center;
        font-size: 30px;
        color: var(--white-82);
      }

      .mode-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .mode-btn {
        width: 200px;
        height: 60px;
        font-size: 24px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .mode-btn.active {
        background: var(--white-100);
        color: #0a0a0a;
        border-color: transparent;
      }

      .controls-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .inline-form {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .inline-form input,
      .inline-form select,
      .inline-form button,
      .counter button {
        height: 42px;
        font-size: 16px;
        padding: 0 12px;
      }

      .inline-form input {
        width: 280px;
      }

      .counter {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--white-25);
      }

      .counter-label {
        font-size: 16px;
        padding: 0 12px;
        height: 42px;
        display: flex;
        align-items: center;
      }

      .counter-value {
        min-width: 56px;
        text-align: center;
      }

      .counter button {
        min-width: 42px;
        border: 0;
        border-left: 1px solid var(--white-25);
      }

      .break-summary {
        text-align: center;
        font-size: 28px;
        color: var(--white-82);
      }

      .break-task-admin {
        border-top: 1px solid var(--white-12);
        padding-top: 12px;
        max-height: 260px;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .break-task-admin::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .admin-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--white-10);
        padding: 8px;
        margin-bottom: 8px;
      }

      .admin-title {
        font-size: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .admin-actions {
        display: flex;
        gap: 6px;
      }

      .admin-actions button {
        height: 30px;
        font-size: 12px;
        padding: 0 8px;
      }

      .break-progress-base {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 1440px;
        height: 24px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0;
      }

      .obs-status {
        position: absolute;
        right: 10px;
        top: 10px;
        font-size: 12px;
        color: var(--white-45);
      }

      .obs-frame {
        position: absolute;
        border: 1px solid var(--white-12);
        background: transparent;
        pointer-events: none;
        z-index: 10;
        /* Matches the visual thickness and style of your context-pills */
      }

      .frame-display {
        left: 10px;
        top: 10px;
        width: 1420px;
        height: 799px;
      }

      .frame-webcam {
        left: 1095.33px;
        top: 819px;
        width: 334.67px;
        height: 251px;
      }
    </style>
  </head>
  <body class="mode-work">
    <div class="overlay-root">
      
      <!-- Hardware Source Outline Pills -->
      <div class="obs-frame frame-display" aria-hidden="true"></div>
      <div class="obs-frame frame-webcam" aria-hidden="true"></div>

      <section class="zone-top">
        <aside class="timeline" id="timeline">
          <div class="timeline-list" id="timelineList"></div>
        </aside>
      </section>

      <section class="context-shell" id="contextShell" aria-label="Work and talk context panel">
        <div class="context-panel">
          <div class="hero-col">
            <div class="context-pill stack hero-timer-pill">
              <div class="today-time" id="todayTime">00:00:00</div>
              <div class="session-line">
                <span class="session-label">since last break</span>
                <span id="sessionTime">00:00:00</span>
              </div>
            </div>
            <div class="context-pill hero-pill">
              <div class="side-line" id="dayHoursLine">Day 1 - 0.0/2000 Accumulated hours</div>
            </div>
          </div>
          <div class="side-col">
            <div class="context-pill stack">
              <div class="side-line" id="dateDayLine">Tuesday, April 14</div>
              <div class="side-line" id="timeLine">09:28 AM</div>
            </div>
            <div class="context-pill stack">
              <div class="side-line" id="contactedLine">Contacted: 0</div>
              <div class="side-line" id="convertedLine">Converted: 0</div>
            </div>
          </div>
          <div class="webcam-col"></div>
        </div>
      </section>

      <section class="progress-strip" aria-hidden="true">
        <div class="progress-fill" id="progressStripFill"></div>
      </section>

      <section class="break-screen" id="breakScreen">
        <div class="break-fill" id="breakFill"></div>
        <div class="break-content">
          <div class="obs-status inverted" id="obsStatus">OBS: disconnected</div>
          <div class="break-clock inverted" id="breakClock">00:00</div>
          <div class="break-date inverted" id="breakDate">Tuesday, Apr 14, 2026</div>
          <div class="break-duration inverted" id="breakDuration">BREAK - 00:00</div>

          <div class="mode-buttons">
            <button class="mode-btn inverted" data-mode="work">WORK</button>
            <button class="mode-btn inverted" data-mode="talk">TALK</button>
            <button class="mode-btn inverted active" data-mode="break">BREAK</button>
          </div>

          <div class="controls-row inverted">
            <form class="inline-form" id="taskForm">
              <input id="taskName" type="text" maxlength="90" placeholder="Task name" required />
              <select id="taskStatus">
                <option value="in_progress">In Progress</option>
                <option value="waiting">Waiting</option>
                <option value="done">Done</option>
              </select>
              <button type="submit">Add Task</button>
            </form>

            <div class="counter" data-counter="contacted">
              <div class="counter-label">Contacted</div>
              <button type="button" data-dec="contacted">-</button>
              <div class="counter-label counter-value" id="contactedCounter">0</div>
              <button type="button" data-inc="contacted">+</button>
            </div>

            <div class="counter" data-counter="converted">
              <div class="counter-label">Converted</div>
              <button type="button" data-dec="converted">-</button>
              <div class="counter-label counter-value" id="convertedCounter">0</div>
              <button type="button" data-inc="converted">+</button>
            </div>
          </div>

          <div class="break-summary inverted" id="breakSummary">0.0h / 2000h - Day 1 / 265 - Session 00:00:00 - Today 00:00:00</div>

          <div class="break-task-admin inverted" id="breakTaskAdmin"></div>
        </div>
        <div class="break-progress-base"></div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5.0.6/dist/obs-ws.min.js"></script>
    <script>
      // --- CONFIG -----------------------------------------------------------
      const OBS_WS_URL = "ws://localhost:4455";
      const OBS_PASSWORD = "TODO_SET_OBS_PASSWORD"; // Set local value only.
      const SCENE_WORK = "Work";
      const SCENE_TALK = "Talk";
      const SCENE_BREAK = "Break";
      const HOURS_TARGET = 2000;
      const CHALLENGE_START = "2026-04-10";
      const CHALLENGE_TOTAL_DAYS = 265;
      const CANVAS_WIDTH = 1440;
      const CONTEXT_WIDTH = 1075.33;
      // ---------------------------------------------------------------------

      const KEYS = {
        mode: "overlay_mode",
        sessionSeconds: "overlay_session_seconds",
        todaySeconds: "overlay_today_seconds",
        todayDate: "overlay_today_date",
        accumulatedSeconds: "overlay_accumulated_seconds",
        contacted: "overlay_contacted",
        converted: "overlay_converted",
        tasks: "overlay_tasks",
        currentTaskId: "overlay_current_task_id"
      };

      const state = {
        mode: "work",
        sessionSeconds: 0,
        todayWorkSeconds: 0,
        accumulatedTotalSeconds: 0,
        contactedCount: 0,
        convertedCount: 0,
        tasks: [],
        currentTaskId: null,
        breakStartTime: null,
        streamStartDate: null
      };

      const dom = {
        body: document.body,
        todayTime: document.getElementById("todayTime"),
        sessionTime: document.getElementById("sessionTime"),
        dayHoursLine: document.getElementById("dayHoursLine"),
        dateDayLine: document.getElementById("dateDayLine"),
        timeLine: document.getElementById("timeLine"),
        contactedLine: document.getElementById("contactedLine"),
        convertedLine: document.getElementById("convertedLine"),
        timelineList: document.getElementById("timelineList"),
        progressStripFill: document.getElementById("progressStripFill"),
        breakFill: document.getElementById("breakFill"),
        breakClock: document.getElementById("breakClock"),
        breakDate: document.getElementById("breakDate"),
        breakDuration: document.getElementById("breakDuration"),
        breakSummary: document.getElementById("breakSummary"),
        breakTaskAdmin: document.getElementById("breakTaskAdmin"),
        taskForm: document.getElementById("taskForm"),
        taskName: document.getElementById("taskName"),
        taskStatus: document.getElementById("taskStatus"),
        contactedCounter: document.getElementById("contactedCounter"),
        convertedCounter: document.getElementById("convertedCounter"),
        obsStatus: document.getElementById("obsStatus"),
        modeButtons: Array.from(document.querySelectorAll(".mode-btn"))
      };

      const obs = typeof OBSWebSocket !== "undefined" ? new OBSWebSocket() : null;
      let obsConnected = false;
      let saveTick = 0;
      let lastClockDate = "";

      function clamp(number, min, max) {
        return Math.min(max, Math.max(min, number));
      }

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function formatHMS(totalSeconds) {
        const safe = Math.max(0, Number(totalSeconds) || 0);
        const hours = Math.floor(safe / 3600);
        const minutes = Math.floor((safe % 3600) / 60);
        const seconds = safe % 60;
        return pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
      }

      function formatHM(date) {
        return pad(date.getHours()) + ":" + pad(date.getMinutes());
      }

      function formatTime12(date) {
        let hours = date.getHours();
        const minutes = pad(date.getMinutes());
        const meridiem = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        if (hours === 0) hours = 12;
        return hours + ":" + minutes + " " + meridiem;
      }

      function toDayName(date) {
        return date.toLocaleDateString("en-US", {
          weekday: "long"
        });
      }

      function toDayDate(date) {
        return date.toLocaleDateString("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric"
        });
      }

      function toLongDate(date) {
        return date.toLocaleDateString("en-US", {
          weekday: "long",
          month: "short",
          day: "numeric",
          year: "numeric"
        });
      }

      function todayKey(date) {
        return date.toISOString().slice(0, 10);
      }

      function getDayNumber(date) {
        const start = new Date(CHALLENGE_START + "T00:00:00");
        const current = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diffMs = current - start;
        const diffDays = Math.floor(diffMs / 86400000) + 1;
        return Math.max(1, diffDays);
      }

      function formatHours(totalSeconds) {
        return (Math.max(0, totalSeconds) / 3600).toFixed(1);
      }

      function relativeTime(timestamp) {
        const now = Date.now();
        const diff = Math.max(0, now - Number(timestamp || now));
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);

        if (mins < 1) return "just now";
        if (mins < 60) return mins + "m ago";
        if (hours < 24) return hours + "h ago";
        if (days === 1) return "yesterday";
        return days + "d ago";
      }

      function normalizeTaskStatus(status) {
        if (status === "done" || status === "waiting" || status === "in_progress") {
          return status;
        }
        return "waiting";
      }

      function statusLabel(status) {
        if (status === "in_progress") return "IN PROGRESS";
        if (status === "done") return "DONE";
        return "WAITING";
      }

      function loadState() {
        const now = new Date();
        const today = todayKey(now);

        const storedMode = localStorage.getItem(KEYS.mode);
        if (storedMode === "work" || storedMode === "talk" || storedMode === "break") {
          state.mode = storedMode;
        }

        state.sessionSeconds = Number(localStorage.getItem(KEYS.sessionSeconds)) || 0;
        state.todayWorkSeconds = Number(localStorage.getItem(KEYS.todaySeconds)) || 0;
        state.accumulatedTotalSeconds = Number(localStorage.getItem(KEYS.accumulatedSeconds)) || 0;
        state.contactedCount = Number(localStorage.getItem(KEYS.contacted)) || 0;
        state.convertedCount = Number(localStorage.getItem(KEYS.converted)) || 0;

        const savedDate = localStorage.getItem(KEYS.todayDate);
        if (savedDate !== today) {
          state.sessionSeconds = 0;
          state.todayWorkSeconds = 0;
          localStorage.setItem(KEYS.todayDate, today);
        }

        try {
          const rawTasks = localStorage.getItem(KEYS.tasks);
          let parsed = rawTasks ? JSON.parse(rawTasks) : [];
          
          if (!rawTasks || parsed.length === 0) {
            const now = Date.now();
            parsed = [
              { id: "mock_1", name: "Create Env", status: "done", createdAt: now - 3600000 * 4, completedAt: now - 3600000 * 3 },
              { id: "mock_2", name: "Refactor Main Grid Layout", status: "done", createdAt: now - 3600000 * 2, completedAt: now - 3600000 * 1 },
              { id: "mock_3", name: "Deploy DB", status: "in_progress", createdAt: now - 3600000 * 0.8, completedAt: null }
            ];
            localStorage.setItem(KEYS.currentTaskId, "mock_3");
          }

          state.tasks = Array.isArray(parsed)
            ? parsed.map(function (task) {
                return {
                  id: String(task.id || ""),
                  name: String(task.name || "Untitled task"),
                  status: normalizeTaskStatus(task.status),
                  createdAt: Number(task.createdAt || Date.now()),
                  completedAt: task.completedAt ? Number(task.completedAt) : null
                };
              })
            : [];
        } catch (error) {
          console.error("Failed to parse tasks from localStorage", error);
          state.tasks = [];
        }

        const currentTaskId = localStorage.getItem(KEYS.currentTaskId);
        state.currentTaskId = currentTaskId || null;

        if (state.mode === "break") {
          state.breakStartTime = Date.now();
        }

        state.streamStartDate = today;
      }

      function saveState(full) {
        localStorage.setItem(KEYS.mode, state.mode);
        localStorage.setItem(KEYS.sessionSeconds, String(state.sessionSeconds));
        localStorage.setItem(KEYS.todaySeconds, String(state.todayWorkSeconds));
        localStorage.setItem(KEYS.accumulatedSeconds, String(state.accumulatedTotalSeconds));
        localStorage.setItem(KEYS.contacted, String(state.contactedCount));
        localStorage.setItem(KEYS.converted, String(state.convertedCount));
        localStorage.setItem(KEYS.currentTaskId, state.currentTaskId || "");
        localStorage.setItem(KEYS.todayDate, todayKey(new Date()));

        if (full) {
          localStorage.setItem(KEYS.tasks, JSON.stringify(state.tasks));
        }
      }

      function orderedTasks() {
        const current = state.currentTaskId
          ? state.tasks.find(function (task) { return task.id === state.currentTaskId; })
          : state.tasks.find(function (task) { return task.status === "in_progress"; });

        const currentTask = current || null;
        const done = state.tasks
          .filter(function (task) { return !currentTask || task.id !== currentTask.id; })
          .filter(function (task) { return task.status === "done"; })
          .sort(function (a, b) {
            return (b.completedAt || b.createdAt) - (a.completedAt || a.createdAt);
          });

        const waiting = state.tasks
          .filter(function (task) { return !currentTask || task.id !== currentTask.id; })
          .filter(function (task) { return task.status === "waiting" || task.status === "in_progress"; })
          .sort(function (a, b) {
            return b.createdAt - a.createdAt;
          });

        const list = [];
        if (currentTask) list.push(currentTask);
        return list.concat(done).concat(waiting);
      }

      function renderTimeline() {
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

        const activeTasks = state.tasks.filter(function(t) {
          const time = t.status === "done" ? (t.completedAt || t.createdAt) : t.createdAt;
          return time >= startOfToday && (t.status === "in_progress" || t.status === "done" || t.id === state.currentTaskId);
        });

        const currentTask = activeTasks.find(function(t) { return t.id === state.currentTaskId || t.status === "in_progress"; });
        const doneTasks = activeTasks.filter(function(t) { return t.id !== (currentTask && currentTask.id) && t.status === "done"; })
          .sort(function(a, b) { return (b.completedAt || b.createdAt) - (a.completedAt || a.createdAt); });

        const displayTasks = [];
        if (currentTask) displayTasks.push(currentTask);
        for (let i = 0; i < doneTasks.length; i++) {
          displayTasks.push(doneTasks[i]);
        }

        let html = "";
        displayTasks.forEach(function(task, idx) {
          const isCurrent = currentTask && currentTask.id === task.id;
          const pillClass = isCurrent ? "tl-pill current" : "tl-pill done";
          const metaClass = isCurrent ? "tl-meta current" : "tl-meta done";

          const when = task.status === "done" ? (task.completedAt || task.createdAt) : task.createdAt;
          const statusStr = isCurrent ? "in progress" : "done";
          const timeStr = isCurrent ? "started " + relativeTime(task.createdAt) : relativeTime(when);
          const metaText = "&#9679;&nbsp;&nbsp;" + statusStr + " &middot; " + timeStr;

          html += '<div class="tl-item">';
          html +=   '<div class="' + pillClass + '">';
          html +=     '<div class="tl-title">' + escapeHtml(task.name) + '</div>';
          html +=     '<div class="' + metaClass + '">' + metaText + '</div>';
          html +=   '</div>';
          html += '</div>';
        });

        dom.timelineList.innerHTML = html;
      }

      function renderBreakAdmin() {
        const tasks = orderedTasks();
        dom.breakTaskAdmin.innerHTML = "";

        tasks.slice(0, 12).forEach(function (task) {
          const row = document.createElement("div");
          row.className = "admin-row";

          const title = document.createElement("div");
          title.className = "admin-title";
          title.textContent = statusLabel(task.status) + " - " + task.name;
          row.appendChild(title);

          const actions = document.createElement("div");
          actions.className = "admin-actions";

          actions.appendChild(adminButton("Current", function () { setTaskStatus(task.id, "in_progress"); }));
          actions.appendChild(adminButton("Done", function () { setTaskStatus(task.id, "done"); }));
          actions.appendChild(adminButton("Waiting", function () { setTaskStatus(task.id, "waiting"); }));
          actions.appendChild(adminButton("Delete", function () { deleteTask(task.id); }));

          row.appendChild(actions);
          dom.breakTaskAdmin.appendChild(row);
        });
      }

      function adminButton(label, onClick) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.addEventListener("click", onClick);
        return button;
      }

      function setTaskStatus(taskId, status) {
        const safeStatus = normalizeTaskStatus(status);
        let changed = false;

        state.tasks = state.tasks.map(function (task) {
          if (task.id !== taskId) {
            if (safeStatus === "in_progress" && task.status === "in_progress") {
              changed = true;
              return Object.assign({}, task, { status: "waiting" });
            }
            return task;
          }

          changed = true;
          const updated = Object.assign({}, task, { status: safeStatus });
          if (safeStatus === "done") {
            updated.completedAt = Date.now();
            if (state.currentTaskId === task.id) {
              state.currentTaskId = null;
            }
          } else if (safeStatus === "in_progress") {
            updated.completedAt = null;
            state.currentTaskId = task.id;
          }
          return updated;
        });

        if (changed) {
          saveState(true);
          renderAll();
        }
      }

      function deleteTask(taskId) {
        const before = state.tasks.length;
        state.tasks = state.tasks.filter(function (task) { return task.id !== taskId; });
        if (state.currentTaskId === taskId) {
          state.currentTaskId = null;
        }
        if (state.tasks.length !== before) {
          saveState(true);
          renderAll();
        }
      }

      function addTask(name, status) {
        const taskName = String(name || "").trim();
        if (!taskName) return;

        const safeStatus = normalizeTaskStatus(status || "in_progress");
        const id = "task_" + Date.now() + "_" + Math.floor(Math.random() * 1000);

        if (safeStatus === "in_progress") {
          state.tasks = state.tasks.map(function (task) {
            if (task.status === "in_progress") {
              return Object.assign({}, task, { status: "waiting" });
            }
            return task;
          });
          state.currentTaskId = id;
        }

        const now = Date.now();
        state.tasks.unshift({
          id: id,
          name: taskName,
          status: safeStatus,
          createdAt: now,
          completedAt: safeStatus === "done" ? now : null
        });

        if (safeStatus === "done") {
          state.currentTaskId = null;
        }

        saveState(true);
        renderAll();
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function setMode(newMode, options) {
        const opts = options || {};
        if (newMode !== "work" && newMode !== "talk" && newMode !== "break") return;
        if (state.mode === newMode) {
          renderModeButtons();
          return;
        }

        const previousMode = state.mode;
        state.mode = newMode;

        if (newMode === "break") {
          state.breakStartTime = Date.now();
        }

        if (previousMode === "break" && (newMode === "work" || newMode === "talk")) {
          state.sessionSeconds = 0;
          state.breakStartTime = null;
        }

        dom.body.classList.remove("mode-work", "mode-talk", "mode-break");
        dom.body.classList.add("mode-" + state.mode);

        if (opts.syncObs !== false) {
          pushObsSceneForMode(newMode);
        }

        saveState(true);
        renderAll();
      }

      function renderModeButtons() {
        dom.modeButtons.forEach(function (button) {
          const mode = button.getAttribute("data-mode");
          if (mode === state.mode) {
            button.classList.add("active");
          } else {
            button.classList.remove("active");
          }
        });
      }

      function renderProgress() {
        const progress = clamp(state.todayWorkSeconds / (7 * 3600), 0, 1);
        const stripWidth = (progress * CONTEXT_WIDTH).toFixed(2) + "px";
        const breakWidth = (progress * CANVAS_WIDTH).toFixed(2) + "px";
        dom.progressStripFill.style.width = stripWidth;
        dom.breakFill.style.width = breakWidth;
      }

      function renderContextClock(now) {
        const winDate = (now.getMonth() + 1) + "/" + now.getDate() + "/" + now.getFullYear();
        const shortDay = now.toLocaleDateString("en-US", { weekday: "short" });
        dom.dateDayLine.textContent = winDate;
        dom.timeLine.textContent = shortDay + " - " + formatTime12(now);
        dom.breakClock.textContent = formatHM(now);
        dom.breakDate.textContent = toLongDate(now);
      }

      function renderStats(now) {
        const dayNumber = getDayNumber(now);
        const hours = formatHours(state.accumulatedTotalSeconds);

        dom.todayTime.textContent = formatHMS(state.todayWorkSeconds);
        dom.sessionTime.textContent = formatHMS(state.sessionSeconds);
        dom.dayHoursLine.textContent = "Day " + dayNumber + " - " + hours + "/" + HOURS_TARGET + " Hours Accumulated";

        dom.contactedLine.textContent = "Contacted: " + state.contactedCount;
        dom.convertedLine.textContent = "Converted: " + state.convertedCount;

        dom.contactedCounter.textContent = String(state.contactedCount);
        dom.convertedCounter.textContent = String(state.convertedCount);

        const breakSeconds = state.mode === "break" && state.breakStartTime
          ? Math.max(0, Math.floor((Date.now() - state.breakStartTime) / 1000))
          : 0;

        dom.breakDuration.textContent = "BREAK - " + formatHMS(breakSeconds).slice(3);
        dom.breakSummary.textContent =
          hours + "h / " + HOURS_TARGET + "h - Day " + dayNumber + " / " + CHALLENGE_TOTAL_DAYS +
          " - Session " + formatHMS(state.sessionSeconds) + " - Today " + formatHMS(state.todayWorkSeconds);
      }

      function renderAll() {
        const now = new Date();
        dom.body.classList.remove("mode-work", "mode-talk", "mode-break");
        dom.body.classList.add("mode-" + state.mode);
        renderModeButtons();
        renderProgress();
        renderContextClock(now);
        renderStats(now);
        renderTimeline();
        renderBreakAdmin();
      }

      function rolloverIfNeeded(now) {
        const dateKey = todayKey(now);
        if (lastClockDate && lastClockDate !== dateKey) {
          state.todayWorkSeconds = 0;
          state.sessionSeconds = 0;
          localStorage.setItem(KEYS.todayDate, dateKey);
          saveState(true);
        }
        lastClockDate = dateKey;
      }

      function timerTick() {
        const now = new Date();
        rolloverIfNeeded(now);

        if (state.mode !== "break") {
          state.sessionSeconds += 1;
          state.todayWorkSeconds += 1;
          state.accumulatedTotalSeconds += 1;
        }

        saveTick += 1;
        if (saveTick >= 10) {
          saveTick = 0;
          saveState(false);
        }

        renderAll();
      }

      function adjustMetric(metric, delta) {
        if (metric === "contacted") {
          state.contactedCount = Math.max(0, state.contactedCount + delta);
        } else if (metric === "converted") {
          state.convertedCount = Math.max(0, state.convertedCount + delta);
        }

        saveState(true);
        renderAll();
      }

      function pushObsSceneForMode(mode) {
        if (!obs || !obsConnected) return;

        const scene = mode === "work" ? SCENE_WORK : mode === "talk" ? SCENE_TALK : SCENE_BREAK;
        obs.call("SetCurrentProgramScene", { sceneName: scene }).catch(function (error) {
          console.error("OBS scene switch failed", error);
        });
      }

      function sceneToMode(sceneName) {
        if (sceneName === SCENE_WORK) return "work";
        if (sceneName === SCENE_TALK) return "talk";
        if (sceneName === SCENE_BREAK) return "break";
        return null;
      }

      async function connectObs() {
        if (!obs) {
          dom.obsStatus.textContent = "OBS: library missing";
          return;
        }

        try {
          await obs.connect(OBS_WS_URL, OBS_PASSWORD);
          obsConnected = true;
          dom.obsStatus.textContent = "OBS: connected";

          const current = await obs.call("GetCurrentProgramScene");
          const mapped = sceneToMode(current.currentProgramSceneName);
          if (mapped) {
            setMode(mapped, { syncObs: false });
          }

          obs.on("CurrentProgramSceneChanged", function (event) {
            const mappedMode = sceneToMode(event.sceneName);
            if (mappedMode) {
              setMode(mappedMode, { syncObs: false });
            }
          });

          obs.on("ConnectionClosed", function () {
            obsConnected = false;
            dom.obsStatus.textContent = "OBS: disconnected";
            setTimeout(connectObs, 5000);
          });
        } catch (error) {
          obsConnected = false;
          dom.obsStatus.textContent = "OBS: disconnected";
          console.error("OBS connect failed", error);
          setTimeout(connectObs, 5000);
        }
      }

      function bindEvents() {
        dom.modeButtons.forEach(function (button) {
          button.addEventListener("click", function () {
            const mode = button.getAttribute("data-mode");
            setMode(mode, { syncObs: true });
          });
        });

        document.querySelectorAll("[data-inc]").forEach(function (button) {
          button.addEventListener("click", function () {
            adjustMetric(button.getAttribute("data-inc"), 1);
          });
        });

        document.querySelectorAll("[data-dec]").forEach(function (button) {
          button.addEventListener("click", function () {
            adjustMetric(button.getAttribute("data-dec"), -1);
          });
        });

        dom.taskForm.addEventListener("submit", function (event) {
          event.preventDefault();
          addTask(dom.taskName.value, dom.taskStatus.value);
          dom.taskName.value = "";
          dom.taskStatus.value = "in_progress";
        });
      }

      // --- VERCEL HTTP POLLING ---
      let pollingInterval = null;

      function setupVercelPolling() {
        const POLL_RATE_MS = 5000; // Check Vercel every 5 seconds for Kanban updates

        // Clean up any existing intervals
        if(pollingInterval) clearInterval(pollingInterval);
        
        async function fetchKanbanState() {
          try {
            // Re-point the API to wherever you deploy the website
            const response = await fetch("https://tiesin.me/api/stream/state");
            if (!response.ok) {
              console.warn("Vercel API Polling error", response.status);
              return;
            }
            
            const stateData = await response.json();
            
            if (stateData && stateData.tasks && Array.isArray(stateData.tasks)) {
              // Iterate over all tasks pulled down from Vercel/Supabase
              stateData.tasks.forEach(taskData => {
                 handleTaskUpdate(taskData);
              });
            }
          } catch(e) {
            console.error("Vercel Poll failed entirely", e);
          }
        }

        // 1. Instantly pull on load
        fetchKanbanState();
        // 2. Poll every X seconds while streaming
        pollingInterval = setInterval(fetchKanbanState, POLL_RATE_MS);
      }

      function handleTaskUpdate(data) {
        if (!data.id || !data.name) return;

        // Map Kanban statuses to Overlay statuses (in_progress, done, waiting)
        const safeInputStatus = String(data.status || "waiting").toLowerCase();
        let mappedStatus = "waiting";

        if (safeInputStatus === "in progress") mappedStatus = "in_progress";
        else if (safeInputStatus === "done" || safeInputStatus === "in review") mappedStatus = "done";
        else if (safeInputStatus === "waiting" || safeInputStatus === "upnext") mappedStatus = "waiting";

        const now = Date.now();
        const taskId = String(data.id);
        let changed = false;

        state.tasks = state.tasks.filter(function(task) {
          // If this is a new "in_progress" task coming in, mark any existing ones as waiting
          if (mappedStatus === "in_progress" && task.status === "in_progress" && task.id !== taskId) {
            changed = true;
            return Object.assign({}, task, { status: "waiting" });
          }
          return true;
        });

        let existingTask = state.tasks.find(function(t) { return t.id === taskId; });

        if (existingTask) {
          if (existingTask.name !== data.name) {
            existingTask.name = data.name;
            changed = true;
          }
          if (existingTask.status !== mappedStatus) {
            existingTask.status = mappedStatus;
            changed = true;
            if (mappedStatus === "done" && !existingTask.completedAt) {
              existingTask.completedAt = now;
            }
          }
        } else {
          // New task arriving from Kanban
          state.tasks.unshift({
            id: taskId,
            name: String(data.name).trim(),
            status: mappedStatus,
            createdAt: now,
            completedAt: mappedStatus === "done" ? now : null
          });
          changed = true;
          existingTask = state.tasks[0];
        }

        // Keep currentTaskId in sync
        if (mappedStatus === "in_progress") {
          if (state.currentTaskId !== taskId) {
            state.currentTaskId = taskId;
            changed = true;
          }
        } else if (mappedStatus === "done" && state.currentTaskId === taskId) {
          state.currentTaskId = null;
          changed = true;
        }

        if (changed) {
          saveState(true);
          renderAll();
        }
      }

      function init() {
        loadState();
        bindEvents();
        renderAll();
        setupVercelPolling();
        setInterval(timerTick, 1000);
        connectObs();
      }

      init();
    </script>
  </body>
</html>
